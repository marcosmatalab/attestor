        - { id: art15_accuracy_robustness, effective_date: "2027-12-02" }
        - { id: art16_provider_obligations, effective_date: "2027-12-02" }
        - { id: art17_quality_management, effective_date: "2027-12-02" }
        - { id: art43_conformity_assessment, effective_date: "2027-12-02" }
        - { id: art47_eu_declaration, effective_date: "2027-12-02" }
        - { id: art48_ce_marking, effective_date: "2027-12-02" }
        - { id: art49_registration, effective_date: "2027-12-02" }

